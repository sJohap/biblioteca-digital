{% extends "base.html" %}
{% block titulo %}{{ 'Modificar' if socio else 'Nuevo' }} Socio{% endblock %}
{% block contenido %}
<div class="contenedor-formulario">
    <h2>{{ 'Modificar socio' if socio else 'Nuevo socio' }}</h2>
    <form method="post" class="formulario">
        <label for="nombre">Nombre *</label>
        <input type="text" id="nombre" name="nombre" value="{{ socio.nombre if socio else '' }}" required>
        <label for="email">Correo *</label>
        <input type="email" id="email" name="email" value="{{ socio.email if socio else '' }}" required>
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" value="{{ socio.telefono if socio else '' }}">
        <div class="grupo-botones">
            <button type="submit" class="boton boton-principal">Guardar</button>
            <a href="{{ url_for('socios.indice') }}" class="boton boton-secundario">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
